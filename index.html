<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Booking App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>MyServiceApp</h2>
        <button id="logoutBtn">Logout</button>
    </nav>

    <hr>

    <!-- LEFT SIDE -->
    <div>
        <h3>Added Items</h3>

        <!-- cart display -->
        <div id="cart-display">
            No items have been added.
        </div>

        <p>Total: $ <span id="total-price">0</span></p>

        <hr>

        <!-- BOOKING FORM -->
        <h3>Book Now</h3>

        <form id="bookingForm">
            <input type="text" id="name" placeholder="Enter name"><br><br>
            <input type="email" id="email" placeholder="Enter email"><br><br>
            <input type="password" id="password" placeholder="Enter password"><br><br>

            <button type="submit">Book Now</button>
        </form>

        <p id="msg"></p>
    </div>

    <hr>

    <!-- RIGHT SIDE -->
    <div>
        <h3>Services</h3>

        <div>
            <p>Basic Consulting - $50</p>
            <button onclick="addItem('Basic Consulting', 50)">Add Item</button>
            <button class="skip-btn">Skip Item</button>
        </div>

        <br>

        <div>
            <p>Premium Support - $120</p>
            <button onclick="addItem('Premium Support', 120)">Add Item</button>
            <button class="skip-btn">Skip Item</button>
        </div>

    </div>

    <!-- SCRIPT AT END -->
    <script src="script.js"></script>

</body>
</html>
